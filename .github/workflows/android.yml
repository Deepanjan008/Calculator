name: Android CI & PR Creator

on:
  push:
    branches:
      - experiment/core-upgrade

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create Pull Request
        run: |
          gh pr create \
            --base main \
            --head experiment/core-upgrade \
            --title "Fix Core Math Parser Bugs and Modularize Project" \
            --body "This PR fixes the core math parser bugs (unary minus and nested square root) and modularizes the project structure." \
            || echo "PR already exists or could not be created."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
