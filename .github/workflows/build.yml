name: Advanced Build and Sign APK

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo -n "$KEYSTORE_B64" | base64 --decode > app/nexura_release.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug and Release APK
      env:
        NEO_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        NEO_KEY_ALIAS: ${{ vars.KEY_ALIAS }}
        NEO_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleDebug assembleRelease --parallel --build-cache --configuration-cache

    - name: Rename APKs
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Calculator-debug-${{ inputs.version_tag }}.apk
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Calculator-release-${{ inputs.version_tag }}.apk

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Nexura-Calculator-Signed
        path: app/build/outputs/apk/release/*.apk

    - name: Publish GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ inputs.version_tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
          echo "Release ${{ inputs.version_tag }} already exists. Proceeding to upload assets."
        else
          echo "Release ${{ inputs.version_tag }} does not exist. Creating tag and release."
          gh release create "${{ inputs.version_tag }}" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ inputs.version_tag }}" \
            --notes "### What's New in ${{ inputs.version_tag }}
            - **Unit Converter Bottom Sheet:** The Unit Converter screen is now fully rendered as a bottom sheet with a beautiful layout hierarchy and a close button, resolving the black cutoff and rendering delay issues.
            - **Transparent Scrim Logic:** Leverages native \`ModalBottomSheet\` scrim behaviors to keep the main calculator grid perfectly visible and crisp in real-time.
            - **Modular Architecture Slot API:** Refactored navigation to use Compose slot API for decoupling feature modules, maintaining strict project structure separation.
            - **Performance & Stability:** Under-the-hood stability improvements, optimized recompositions, and fixed warning/compilation outputs."
        fi
        
        gh release upload "${{ inputs.version_tag }}" \
          --repo "${{ github.repository }}" \
          app/build/outputs/apk/debug/Calculator-debug-${{ inputs.version_tag }}.apk \
          app/build/outputs/apk/release/Calculator-release-${{ inputs.version_tag }}.apk \
          --clobber
